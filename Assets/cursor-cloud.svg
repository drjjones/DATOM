<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' viewBox='0 0 32 32'>
  <defs>
    <radialGradient id='cloud' cx='50%' cy='50%' r='50%'>
      <stop offset='0%' stop-color='#00D4FF' stop-opacity='0.9'/>
      <stop offset='15%' stop-color='#00D4FF' stop-opacity='0.7'/>
      <stop offset='35%' stop-color='#06b6d4' stop-opacity='0.4'/>
      <stop offset='55%' stop-color='#0891b2' stop-opacity='0.2'/>
      <stop offset='75%' stop-color='#0e7490' stop-opacity='0.08'/>
      <stop offset='100%' stop-color='#155e75' stop-opacity='0'/>
    </radialGradient>
  </defs>
  <!-- Outer probability cloud -->
  <circle cx='16' cy='16' r='15' fill='url(#cloud)'/>
  <!-- Bright nucleus dot -->
  <circle cx='16' cy='16' r='2.5' fill='#00D4FF' opacity='0.95'/>
  <circle cx='16' cy='16' r='1.2' fill='#ffffff' opacity='0.9'/>
</svg>